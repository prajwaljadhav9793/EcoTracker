<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="{{url_for('static',filename='css/calculator.css')}}" />

  <link rel="icon" href="{{ url_for('static', filename='images/logo.png') }}" />

  <!-- Premium Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <title>EcoTracker Carbon Footprint Calculator</title>
</head>

<body>

  <div class="container">

    <h2>🌍 EcoTracker Carbon Calculator</h2>
    <h3>Track Today. Save Tomorrow.</h3>

    <form action="/calculator" method="POST">
      
      <label>🚗 Vehicle Type</label>
      <select name="vehicle">
        <option value="Car" {% if selected_vehicle == "Car" %}selected{% endif %}>Car</option>
        <option value="Bike" {% if selected_vehicle == "Bike" %}selected{% endif %}>Bike</option>
        <option value="Bus" {% if selected_vehicle == "Bus" %}selected{% endif %}>Bus / Public Transport</option>
        <option value="electric car" {% if selected_vehicle == "electric car" %}selected{% endif %}>Electric Car</option>
        <option value="electric bike" {% if selected_vehicle == "electric bike" %}selected{% endif %}>Electric Bike</option>
        <option value="Bicycle" {% if selected_vehicle == "Bicycle" %}selected{% endif %}>Bicycle</option>
        <option value="Walk" {% if selected_vehicle == "Walk" %}selected{% endif %}>Walk</option>
      </select>

      
      <button type="button" onclick="startJourney()">
        🗺️ Start Journey
      </button>

    
      <label>📍 Distance Travelled (km)</label>
      <input type="number"
       name="distance"
       value="{{ distance }}">
      
      <label>⚡ Electricity Usage (Units / Month)</label>
      <input type="number"
       name="electricity"
       value="{{ electricity }}"> />

      <label>♻️ Waste Generated (kg)</label>
      <input type="number" name="waste" value="{{ waste }}" required />

     
      <button type="submit">
        🌱 Calculate Footprint
      </button>

    </form>

  </div>

  <script>
    function startJourney(){
      let vehicle = document.querySelector("select[name='vehicle']").value;
      localStorage.setItem("vehicle", vehicle);
      window.location.href="/map";
    }
  </script>

</body>
</html>
