<!DOCTYPE html>
<html>
    <head>
        <title>EcoTracker Map</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
      
    <style>
  #map {
    height: 100vh;
    width: 100%;
  }

  #info {
    position: absolute;
    top: 20px;
    left: 20px;
    background: white;
    padding: 10px;
    border-radius: 10px;
    z-index: 1000;
    font-weight: bold;
  }
  #controls {
  position: absolute;
  top: 80px;
  left: 20px;
  z-index: 1000;
}

#controls button {
  display: block;
  margin-bottom: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #8bc34a;
  color: black;
  cursor: pointer;
}
#controls button:hover {
  background: #7cb342;
  transform: scale(0.95);
}

</style>
    </head>

    <body>
        <div id="info">
        Distance: 0 km <br>
        Carbon: 0 kg CO₂
        </div>
        <div id="controls">
            <button onclick="startTracking()">Start Journey</button>
            <button onclick="stopTracking()">Stop Journey</button>        
        </div>
        <div id="map"></div>

        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        <script src="{{url_for('static',filename='js/map.js')}}"></script>
    </body>
</html>
