<!DOCTYPE html>
<html>
<head>
    <title>Eco Tracker Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            text-align: center;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        select, button {
            padding: 10px;
            margin: 10px;
        }

        button {
            background: #2d6a4f;
            color: white;
            border: none;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        canvas {
            margin: 20px;
            width: 300px !important;
            height: 300px !important;
        }
    </style>
</head>
<body>

<h2>🌱 Eco Tracker Dashboard</h2>

<form method="POST">

    <!-- Vehicle -->
    <label>Vehicle:</label><br>
    <select name="vehicle">
        <option value="car">Car</option>
        <option value="bike">Bike</option>
        <option value="bus">Bus</option>
        <option value="cycle">Cycle</option>
    </select><br>

    <!-- Electricity -->
    <label>Electricity Usage:</label><br>
    <select name="electricity">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select><br>

    <!-- Waste -->
    <label>Waste Type:</label><br>
    <select name="waste">
        <option value="plastic">Plastic</option>
        <option value="mixed">Mixed</option>
        <option value="recycle">Recyclable</option>
    </select><br>

    <button type="submit">Calculate</button>
</form>

<!-- Result -->
<div class="card">
    <h3>Total Eco Score: {{ total }}</h3>
    <p>{{ message }}</p>
</div>

<!-- Charts -->
<canvas id="lineChart"></canvas>
<canvas id="barChart"></canvas>
<canvas id="pieChart"></canvas>
<canvas id="doughnutChart"></canvas>
<canvas id="radarChart"></canvas>

<script>
    const labels = {{ labels | tojson }};
    const data = {{ values | tojson }};

    function createChart(id, type) {
        new Chart(document.getElementById(id), {
            type: type,
            data: {
                labels: labels,
                datasets: [{
                    label: 'Eco Points',
                    data: data,
                    borderWidth: 1
                }]
            }
        });
    }

    createChart('lineChart', 'line');
    createChart('barChart', 'bar');
    createChart('pieChart', 'pie');
    createChart('doughnutChart', 'doughnut');
    createChart('radarChart', 'radar');
</script>

</body>
</html>
